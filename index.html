<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suarez y Garcia - Asesorías Financieras</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --azul-pro: #003d4c;
            --dorado: #b8860b;
            --blanco: #ffffff;
            --gris-suave: #f4f4f4;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--gris-suave);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--azul-pro);
        }

        .card {
            background: var(--blanco);
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            overflow: hidden;
            padding: 35px 25px;
            margin: 15px;
        }

        .logo-container img {
            width: 100%;
            max-width: 300px; /* Tamaño ideal para resaltar el logo único */
            height: auto;
            margin-bottom: 5px;
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.1));
        }

        /* Ubicación con estilo elegante */
        .location { 
            font-size: 13px; 
            color: var(--dorado); 
            font-weight: 700; 
            margin-bottom: 30px; 
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .btn-container { display: grid; gap: 12px; }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            transition: all 0.3s ease;
            color: var(--blanco);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            font-size: 14px;
        }

        .btn:active { transform: scale(0.95); }
        .btn i { margin-right: 10px; font-size: 1.2rem; }

        .whatsapp { background-color: #25d366; }
        .llamada { background-color: var(--azul-pro); }
        .correo { background-color: #d44638; }
        .web { background-color: var(--dorado); }
        .pdf { background-color: #333; }

        .footer {
            margin-top: 35px;
            font-size: 10px;
            color: #888;
            border-top: 1px solid #eee;
            padding-top: 15px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="card" id="mainCard">
        <div class="logo-container">
            <img src="1775640713603.png" alt="Suarez y Garcia Logo">
        </div>
        
        <p class="location"><i class="fas fa-map-marker-alt"></i> Caucasia, Antioquia, Colombia</p>

        <div class="btn-container">
            <a href="https://wa.me/573117700111?text=Hola,%20deseo%20asesoría%20financiera" class="btn whatsapp">
                <i class="fab fa-whatsapp"></i> WHATSAPP
            </a>
            
            <a href="tel:+573117700111" class="btn llamada">
                <i class="fas fa-phone-alt"></i> LLAMAR AHORA
            </a>

            <a href="mailto:misabelsh@gmail.com" class="btn correo">
                <i class="fas fa-envelope"></i> ENVIAR CORREO
            </a>

            <a href="https://haroldco45.github.io/suarezygarcia/" class="btn web">
                <i class="fas fa-globe"></i> PÁGINA WEB
            </a>

            <a href="suarez.pdf" class="btn pdf">
                <i class="fas fa-file-pdf"></i> DESCARGAR CATÁLOGO
            </a>
        </div>

        <div class="footer">
            App desarrollada por <strong>Vibras Positivas HM (3117700431)</strong><br>
            Derechos de Autor © 2026 | Colombia
        </div>
    </div>

    <script>
        /**
         * CONTROL INVISIBLE DE SUSCRIPCIÓN
         */
        (function() {
            const fechaVencimiento = new Date('2026-05-08'); 
            const hoy = new Date();

            if (hoy > fechaVencimiento) {
                document.getElementById('mainCard').innerHTML = `
                    <div style="padding: 40px 20px; text-align: center;">
                        <i class="fas fa-exclamation-triangle" style="font-size: 50px; color: #b8860b;"></i>
                        <h2 style="margin-top:20px; color:#003d4c;">Servicio en Mantenimiento</h2>
                        <p style="font-size:14px; margin-top:10px;">Contacte al administrador para renovar su suscripción digital.</p>
                        <p style="font-weight:bold; margin-top:15px; color:#b8860b;">Vibras Positivas: 3117700431</p>
                    </div>
                `;
            }
        })();
    </script>
</body>
</html>
